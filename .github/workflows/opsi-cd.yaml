# Generated by opsi init.
name: Opsi CD

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: opsi-cd-${{ github.repository_id }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has-services: ${{ steps.matrix.outputs.has-services }}
      publish-matrix: ${{ steps.matrix.outputs.publish-matrix }}
      has-publish-services: ${{ steps.matrix.outputs.has-publish-services }}
      config-hash: ${{ steps.matrix.outputs.config-hash }}
      plan-hash: ${{ steps.matrix.outputs.plan-hash }}
      reason-codes: ${{ steps.matrix.outputs.reason-codes }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Check out immutable Opsi planner and helper source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: huutawn/opsi
          ref: 4b871dd786605a63fb508d60b722da688fdbd67d
          path: __opsi_tool_source
          persist-credentials: false
      - name: Set up pinned Go toolchain
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: __opsi_tool_source/cli/go.mod
          cache: false
      - name: Build immutable Opsi planner and helper
        run: |
          set -eu
          mkdir -p "$RUNNER_TEMP/opsi-bin"
          go build -C "$GITHUB_WORKSPACE/__opsi_tool_source/cli" -o "$RUNNER_TEMP/opsi-bin/opsi" ./cmd/opsi
          echo "$RUNNER_TEMP/opsi-bin" >> "$GITHUB_PATH"
        shell: bash
      - name: Resolve affected services
        env:
          OPSI_BASE: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          OPSI_EVENT: ${{ github.event_name == 'pull_request' && 'pull_request' || (github.event_name == 'push' && 'push' || 'initial') }}
          OPSI_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: opsi cd plan --event "$OPSI_EVENT" --base "$OPSI_BASE" --head "$OPSI_HEAD" --json > "$RUNNER_TEMP/opsi-plan.json"
        shell: bash
      - name: Create bounded service matrix and hashes
        id: matrix
        env:
          OPSI_PLAN: ${{ runner.temp }}/opsi-plan.json
          OPSI_EVENT_NAME: ${{ github.event_name }}
          OPSI_REF: ${{ github.ref }}
        run: |
          python3 - "$OPSI_PLAN" "$GITHUB_OUTPUT" "$OPSI_EVENT_NAME" "$OPSI_REF" <<'PY'
          import json
          import pathlib
          import sys

          plan = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          matrix = plan.get("matrix", [])
          reasons = plan.get("reason_codes", [])
          if not isinstance(matrix, list) or len(matrix) > 128:
              raise SystemExit("invalid or oversized Opsi matrix")
          if not isinstance(reasons, list) or len(reasons) > 128:
              raise SystemExit("invalid or oversized Opsi reason list")
          publish = []
          for target in matrix:
              refs = target.get("production_refs", [])
              if not isinstance(refs, list) or len(refs) > 64:
                  raise SystemExit("invalid or oversized production ref list")
              if any(not isinstance(ref, str) or not ref.startswith("refs/heads/") or len(ref) > 512 for ref in refs):
                  raise SystemExit("invalid production ref")
              if sys.argv[3] == "push" and sys.argv[4] in refs:
                  publish.append(target)
          compact = json.dumps({"service": matrix}, separators=(",", ":"), sort_keys=True)
          publish_compact = json.dumps({"service": publish}, separators=(",", ":"), sort_keys=True)
          reason_json = json.dumps(reasons, separators=(",", ":"), sort_keys=True)
          with pathlib.Path(sys.argv[2]).open("a", encoding="utf-8") as output:
              output.write("matrix=" + compact + chr(10))
              output.write("has-services=" + ("true" if matrix else "false") + chr(10))
              output.write("publish-matrix=" + publish_compact + chr(10))
              output.write("has-publish-services=" + ("true" if publish else "false") + chr(10))
              output.write("config-hash=" + str(plan.get("config_hash", "")) + chr(10))
              output.write("plan-hash=" + str(plan.get("plan_hash", "")) + chr(10))
              output.write("reason-codes=" + reason_json + chr(10))
          PY
        shell: bash

  build:
    needs: plan
    if: needs.plan.outputs.has-services == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Build affected service without publishing
        env:
          OPSI_BUILD_CONTEXT: ${{ matrix.service.context }}
          OPSI_DOCKERFILE: ${{ matrix.service.dockerfile }}
          OPSI_PLATFORM: ${{ matrix.service.platform }}
        run: docker build --pull=false --platform "$OPSI_PLATFORM" --file "$OPSI_DOCKERFILE" "$OPSI_BUILD_CONTEXT"
        shell: bash

  publish-and-record:
    needs: plan
    if: needs.plan.outputs.has-publish-services == 'true' && github.event_name == 'push' && github.event.repository.fork == false && startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
    concurrency:
      group: opsi-cd-publish-${{ github.repository_id }}-${{ github.ref }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJSON(needs.plan.outputs.publish-matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Check out immutable Opsi planner and helper source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: huutawn/opsi
          ref: 4b871dd786605a63fb508d60b722da688fdbd67d
          path: __opsi_tool_source
          persist-credentials: false
      - name: Set up pinned Go toolchain
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: __opsi_tool_source/cli/go.mod
          cache: false
      - name: Build immutable Opsi helper
        run: |
          set -eu
          mkdir -p "$RUNNER_TEMP/opsi-bin"
          go build -C "$GITHUB_WORKSPACE/__opsi_tool_source/cli" -o "$RUNNER_TEMP/opsi-bin/opsi" ./cmd/opsi
          echo "$RUNNER_TEMP/opsi-bin" >> "$GITHUB_PATH"
        shell: bash
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435
      - name: Log in to public GHCR with GitHub token
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push immutable image
        id: publish
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          platforms: ${{ matrix.service.platform }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ matrix.service.key }}:${{ github.sha }}
          provenance: true
      - name: Submit verified BuildRecord
        env:
          OPSI_CLOUD_URL: ${{ vars.OPSI_CLOUD_URL }}
          OPSI_DIGEST: ${{ steps.publish.outputs.digest }}
          OPSI_OCI_REPOSITORY: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ matrix.service.key }}
          OPSI_CONFIG_HASH: ${{ needs.plan.outputs.config-hash }}
          OPSI_PLAN_HASH: ${{ needs.plan.outputs.plan-hash }}
          OPSI_PLATFORM: ${{ matrix.service.platform }}
          OPSI_SERVICE_KEY: ${{ matrix.service.key }}
        run: |
          set -eu
          test -n "$OPSI_DIGEST"
          opsi internal build-record submit-from-github-actions \
            --cloud-url "$OPSI_CLOUD_URL" \
            --service-key "$OPSI_SERVICE_KEY" \
            --config-hash "$OPSI_CONFIG_HASH" \
            --plan-hash "$OPSI_PLAN_HASH" \
            --platform "$OPSI_PLATFORM" \
            --oci-repository "$OPSI_OCI_REPOSITORY" \
            --oci-digest "$OPSI_DIGEST"
        shell: bash
