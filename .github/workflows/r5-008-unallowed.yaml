name: R5-008 Unallowed Workflow

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rejected-submission:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out immutable R5-008 verifier
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: huutawn/opsi
          ref: b1435f0029e0ad65c019ff692bfa80e1f2aa1476
          persist-credentials: false
      - name: Prove unallowlisted workflow rejection
        env:
          OPSI_CLOUD_URL: ${{ vars.OPSI_CLOUD_URL }}
        run: |
          set -eu
          python3 scripts/e2e/verify-r5-008-negative-actions.py \
            --mode expect-forbidden \
            --cloud-url "$OPSI_CLOUD_URL" \
            --config-hash 419314c2e3eaea280cd2e58b41bba84b6472833053aedc7c59db4e359e97a242 \
            --plan-hash e65ab35fe0c791da96a310c9dbad67b0b7dc172cff90a5af92189162048d3eb3 \
            --oci-repository ghcr.io/huutawn/opsi-r5-005-fixture/api \
            --oci-digest sha256:8f047360501903f63616236c592f5721ffc027cf548ac74d02205f8985e89654 \
            --conflict-digest sha256:9f02ca2cb19bc61f322ee6174f057d00b3bde17ae787b390d0abbb0d750dea6a
        shell: bash
